<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turas Hub App</title>
  <link rel="stylesheet" href="css/hub_app.css">
</head>
<body>

  <!-- ================================================================
       PROJECT BROWSER VIEW
       Shows cards for each discovered Turas project
       ================================================================ -->
  <div id="view-projects" class="view active">
    <div class="toolbar">
      <div class="toolbar-left">
        <h2 class="toolbar-title">Projects</h2>
        <span id="project-count" class="toolbar-badge"></span>
      </div>
      <div class="toolbar-right">
        <input type="text"
               id="project-search"
               class="search-input"
               placeholder="Filter projects..."
               autocomplete="off">
        <button id="btn-rescan" class="btn btn-secondary" title="Rescan directories">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          Rescan
        </button>
      </div>
    </div>

    <div id="project-grid" class="project-grid">
      <!-- Populated by project_browser.js -->
    </div>

    <div id="project-empty" class="empty-state" style="display:none;">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <p class="empty-text">No Turas projects found</p>
      <p class="empty-hint">Projects are folders containing Turas HTML reports.
         Check your configured directories.</p>
    </div>

    <div id="project-loading" class="loading-state">
      <div class="spinner"></div>
      <p>Scanning for projects...</p>
    </div>
  </div>

  <!-- ================================================================
       REPORT VIEWER VIEW
       Shows tabbed reports for the selected project
       ================================================================ -->
  <div id="view-reports" class="view">
    <div class="toolbar">
      <div class="toolbar-left">
        <button id="btn-back" class="btn btn-icon" title="Back to projects">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h2 id="project-title" class="toolbar-title"></h2>
        <span id="report-count" class="toolbar-badge"></span>
      </div>
      <div class="toolbar-right">
        <button id="btn-toggle-pins" class="btn btn-secondary" title="Toggle pin board">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="17" x2="12" y2="22"></line>
            <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path>
          </svg>
          Pins
          <span id="pb-count-badge" class="toolbar-badge" style="display:none;">0</span>
        </button>
        <button id="btn-add-section" class="btn btn-secondary" style="display:none;" title="Add section divider">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <line x1="3" y1="6" x2="3.01" y2="6"></line>
            <line x1="3" y1="12" x2="3.01" y2="12"></line>
            <line x1="3" y1="18" x2="3.01" y2="18"></line>
          </svg>
          Section
        </button>
        <span class="toolbar-divider"></span>
        <button id="btn-export-pptx" class="btn btn-secondary" title="Export pins to PowerPoint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
            <polyline points="13 2 13 9 20 9"></polyline>
          </svg>
          PPTX
        </button>
        <button id="btn-export-pngs" class="btn btn-secondary" title="Export all pin charts as PNGs">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          PNGs
        </button>
      </div>
    </div>

    <!-- Report tab bar -->
    <div id="report-tabs" class="report-tab-bar">
      <!-- Populated by report_viewer.js -->
    </div>

    <!-- Main content area: reports + pin board side panel -->
    <div id="reports-layout" class="reports-layout">

      <!-- Report iframe container -->
      <div id="report-container" class="report-container">
        <!-- Iframes created dynamically by report_viewer.js -->
        <div id="report-loading" class="loading-state" style="display:none;">
          <div class="spinner"></div>
          <p>Loading report...</p>
        </div>
      </div>

      <!-- Pin Board side panel (hidden by default) -->
      <div id="pin-board-panel" class="pin-board-panel" style="display:none;">
        <div id="pb-toolbar" class="pb-panel-toolbar" style="display:none;">
          <span class="pb-panel-title">Pinned Views</span>
        </div>

        <!-- Pinned cards container -->
        <div id="pb-cards" class="pb-cards">
          <!-- Populated by pin_board.js -->
        </div>

        <!-- Empty state -->
        <div id="pb-empty" class="pb-empty-state">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.4;">
            <line x1="12" y1="17" x2="12" y2="22"></line>
            <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path>
          </svg>
          <p class="pb-empty-text">No pins yet</p>
          <p class="pb-empty-hint">Pin charts and tables from reports to collect them here.</p>
        </div>
      </div>

    </div>
  </div>

  <!-- ================================================================
       EXPORT PROGRESS OVERLAY
       ================================================================ -->
  <div id="export-progress" class="export-progress" style="display:none;">
    <div class="export-progress-card">
      <div class="spinner"></div>
      <p id="export-progress-text">Exporting...</p>
    </div>
  </div>

  <!-- ================================================================
       TOAST NOTIFICATION
       ================================================================ -->
  <div id="toast" class="toast"></div>

  <!-- ================================================================
       SCRIPTS
       Order matters: utilities first, then components, then app init
       ================================================================ -->
  <script src="js/app.js"></script>
  <script src="js/state.js"></script>
  <script src="js/project_browser.js"></script>
  <script src="js/report_viewer.js"></script>
  <script src="js/pin_board.js"></script>
  <script src="js/export_manager.js"></script>

</body>
</html>
