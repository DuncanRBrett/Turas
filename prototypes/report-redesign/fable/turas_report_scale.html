:root {
  --brand: #323367;

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 14px; }

.visually-hidden {
  position: absolute; width: 1px; height: 1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;
}

/* ---------- buttons ---------- */
button {
  appearance: none; border: 1px solid var(--line); background: #fff; color: var(--ink);
  border-radius: 9px; padding: 6px 12px; font: 600 12.5px var(--font);
  cursor: pointer; transition: border-color .15s, color .15s, background .15s;
}
button:hover { border-color: var(--brand); color: var(--brand); }
button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
button.primary:hover { filter: brightness(1.15); color: #fff; }
button.wide { display: block; width: 100%; margin-top: 10px; padding: 10px; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ---------- top bar ---------- */
.topbar {
  position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 18px;
  padding: 10px 22px; background: #fff; border-bottom: 1px solid var(--line);
}
.brandmark { display: flex; align-items: center; gap: 8px; font-weight: 800; color: var(--brand); font-size: 15px; }
.brandmark .dot { width: 13px; height: 13px; border-radius: 4px;
  background: linear-gradient(135deg, var(--brand), var(--accent)); }
.brandmark .proto { color: var(--muted); font-weight: 500; margin-left: 2px; }
.projmeta { flex: 1; display: flex; align-items: baseline; gap: 10px; min-width: 0; }
.projmeta strong { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.projmeta span { color: var(--muted); font-size: 12.5px; white-space: nowrap; }
.topactions { display: flex; gap: 8px; }
.topactions .count {
  background: rgba(255, 255, 255, .25); border-radius: 999px;
  padding: 1px 7px; font-size: 11px; margin-left: 2px;
}

/* ---------- layout + sidebar ---------- */
.layout { display: flex; align-items: flex-start; }
.sidebar {
  width: 280px; flex: none; position: sticky; top: 54px; height: calc(100vh - 54px);
  overflow-y: auto; background: var(--brand); color: var(--sidebar-fg); padding: 16px 14px 22px;
}
.sidebar input[type="search"] {
  width: 100%; background: rgba(255, 255, 255, .14); border: 1px solid rgba(255, 255, 255, .28);
  color: inherit; border-radius: 8px; padding: 8px 11px; font: 13px var(--font);
}
.sidebar input::placeholder { color: inherit; opacity: .65; }
.navsec { margin: 16px 4px 4px; font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.2px; opacity: .6; }
.navlink {

  color: inherit; text-decoration: none; font-size: 13px;
}
.navlink:hover { background: rgba(255, 255, 255, .12); }
.navlink.hidden { display: none; }
.navlink .code { font-weight: 700; font-size: 11px; opacity: .75; min-width: 26px; }
.navlink .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidefoot {
  margin-top: 20px; padding-top: 12px; border-top: 1px solid rgba(255, 255, 255, .22);
  font-size: 11px; line-height: 1.5; opacity: .65;
}

/* ---------- main + hero ---------- */
main { flex: 1; min-width: 0; padding: 24px 30px 90px; max-width: 1060px; }
.hero {
  background: linear-gradient(135deg, var(--brand), color-mix(in srgb, var(--brand) 72%, #8b8fd9));
  color: #fff; border-radius: var(--radius); padding: 26px 28px; margin-bottom: 22px;
  box-shadow: var(--shadow);
}
.hero h1 { margin: 0 0 4px; font-size: 24px; }
.hero .sub { margin: 0; opacity: .85; font-size: 13.5px; }
.herostats { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
.stat {

}
.stat b { display: block; font-size: 17px; }
.signote { margin: 14px 0 0; font-size: 11.5px; opacity: .8; }

      '<p:sld xmlns:a="' + TR.pptx.NS.a + '" xmlns:r="' + TR.pptx.NS.r +
      '" xmlns:p="' + TR.pptx.NS.p + '"><p:cSld><p:spTree>' +
      '<p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr>' +
      '<p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/>' +
      '<a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>' +
      contentXml + "</p:spTree></p:cSld>" +
      "<p:clrMapOvr><a:masterClrMapping/></p:clrMapOvr></p:sld>";
  }

  function idCounter() {
    var n = 1;
    return { next: function () { return ++n; } };
  }

  function header(idRef, title, metaLine, brand) {
    return barShape(idRef.next(), { x: 0, y: 0, w: C.SLIDE_W_IN, h: 0.07 }, brand) +
      textBox(idRef.next(), "Title",
        { x: MARGIN_IN, y: 0.32, w: C.SLIDE_W_IN - MARGIN_IN * 2, h: TITLE_H_IN },
        [para(title, { size: 21, bold: true, colour: brand })]) +
      textBox(idRef.next(), "Meta",
        { x: MARGIN_IN, y: 1.0, w: C.SLIDE_W_IN - MARGIN_IN * 2, h: META_H_IN },
        [para(metaLine, { size: 11, colour: GREY })]);
  }

  /** Title slide for the deck. */
  slides.titleSlide = function (payload, slideCount) {
    var p = payload.project;
    var brand = hex(TR.charts.brandOf(payload));
    var ids = idCounter();
    var content = barShape(ids.next(), { x: 0, y: 0, w: C.SLIDE_W_IN, h: C.SLIDE_H_IN }, brand) +
      textBox(ids.next(), "Title",
        { x: 1.0, y: 2.4, w: C.SLIDE_W_IN - 2, h: 1.2 },
        [para(p.name, { size: 36, bold: true, colour: WHITE })]) +
      textBox(ids.next(), "Sub", { x: 1.0, y: 3.6, w: C.SLIDE_W_IN - 2, h: 0.9 },
        [para([p.client, p.wave].filter(Boolean).join(" · "),
          { size: 16, colour: "D9DCEC" }),
         para(slideCount + " exhibits · native editable slides built in-report by Turas",
          { size: 12, colour: "B9BEDC" })]);
    return wrap(content);
  };

  /** Chunk matrix body rows for table pagination. */
  function chunkMatrix(matrix) {
    var per = C.PPTX_TABLE_ROWS_PER_SLIDE;
    if (matrix.body.length <= per) return [matrix];
    var chunks = [];
    for (var i = 0; i < matrix.body.length; i += per) {
      chunks.push({ head: matrix.head, body: matrix.body.slice(i, i + per) });
    }
    return chunks;
  }

  /**
   * Slides for one question: bars (as shapes) + native table when compact,
   * otherwise full-width table paginated across continuation slides.
   * @returns {string[]} one or more slide XML strings.
   */
  slides.questionSlides = function (q, payload, colIndex) {
    var brand = hex(TR.charts.brandOf(payload));
    var cols = TR.data.bannerColumns(payload, q);
    var matrix = TR.tables.matrix(q, payload);
    var metaLine = [payload.project.name, payload.project.wave,
      "Base: " + (q.base_label || "All respondents") +
      (q.bases ? " · n=" + fmt.base(q.bases[0]) : "")].filter(Boolean).join(" · ");
    var title = (q.code || q.id) + " — " + q.title;
    var contentH = C.SLIDE_H_IN - CONTENT_TOP_IN - 0.45;
    var compact = (q.rows || []).length > 0 && (q.rows || []).length <= 9 &&
      cols.length <= 6 && matrix.body.length <= C.PPTX_TABLE_ROWS_PER_SLIDE;

    if (compact) {
      var ids = idCounter();
      var barRows = q.rows.map(function (row) {
        return { label: row.label, value: row.values[colIndex],
          sig: row.sig ? row.sig[colIndex] : "" };
      });
      var axisMax = TR.svg.niceMax(TR.data.maxRowValue(q));
      var content = header(ids, title, metaLine +
          " · bars: " + (cols[colIndex] || "Total"), brand) +
        barGroup(ids, { x: MARGIN_IN, y: CONTENT_TOP_IN, w: 5.4, h: contentH },
          barRows, axisMax, brand, payload) +
        tableFrame(ids.next(), { x: 6.3, y: CONTENT_TOP_IN,
          w: C.SLIDE_W_IN - 6.3 - MARGIN_IN,
          h: Math.min(contentH, (matrix.body.length + 1) * 0.32) },
          matrix, brand, 10);
      return [wrap(content)];
    }

    return chunkMatrix(matrix).map(function (chunk, i, all) {
      var ids = idCounter();
      var suffix = all.length > 1 ? " (" + (i + 1) + "/" + all.length + ")" : "";
      return wrap(header(ids, title + suffix, metaLine, brand) +
        tableFrame(ids.next(), { x: MARGIN_IN, y: CONTENT_TOP_IN,
          w: C.SLIDE_W_IN - MARGIN_IN * 2,
          h: Math.min(contentH, (chunk.body.length + 1) * 0.3) },
          chunk, brand, matrix.head.length > 7 ? 9 : 10));
    });
  };

  /** One slide for a composite view: grouped editable bars per question. */
  slides.compositeSlide = function (model, payload) {
    var brand = hex(TR.charts.brandOf(payload));
    var light = hex(TR.svg.shade(TR.charts.brandOf(payload), 0.55));
    var ids = idCounter();
    var title = "Composite — " + model.items.map(function (i) { return i.code; }).join(" + ");
    var metaLine = payload.project.name + " · column: " + model.column +
      " · shared axis 0–" + model.sharedMax + "%";
    var content = header(ids, title, metaLine, brand);
    var contentH = C.SLIDE_H_IN - CONTENT_TOP_IN - 0.4;
    var slotW = (C.SLIDE_W_IN - MARGIN_IN * 2) / model.items.length;
    model.items.forEach(function (item, i) {
      var x = MARGIN_IN + i * slotW;
      content += textBox(ids.next(), "QTitle",
        { x: x, y: CONTENT_TOP_IN, w: slotW - 0.2, h: 0.5 },
        [para(item.code + " · " + TR.charts.clip(item.title, 38),
          { size: 11, bold: true, colour: INK }),
         para("n=" + (item.base != null ? fmt.base(item.base) : "–"),
          { size: 9, colour: GREY })]);
      content += barGroup(ids, { x: x, y: CONTENT_TOP_IN + 0.6,
        w: slotW - 0.3, h: contentH - 0.6 },
        item.rows.slice(0, 8).map(function (r) { return r; }),
        model.sharedMax, i % 2 === 0 ? brand : light, payload);
    });
    return wrap(content);
  };

})(typeof window !== "undefined" ? window : globalThis);

/**
 * Deck builder (Tier B) — collect questions and composite views, then
 * download a native, editable .pptx built entirely in-file (13_zip +
 * 14_pptx_parts + 15_pptx_slides). Shipped only when project.export.pptx
 * is enabled; the whole tier costs ~20 KB of source, not 0.94 MB.
 */
(function (global) {
  "use strict";
  var TR = global.TR, fmt = TR.fmt;

  var deck = TR.deck = {};
  deck.items = [];

  function refreshCount() {
    var badge = document.getElementById("deck-count");
    if (badge) badge.textContent = String(deck.items.length);
  }

  /** Add a question card (with its selected chart column) to the deck. */
  deck.addQuestion = function (card, payload) {
    var q = TR.data.questionById(payload, card.getAttribute("data-q"));
    if (!q) return;
    deck.items.push({ kind: "question", qid: q.id,
      colIndex: parseInt(card.getAttribute("data-col") || "0", 10) || 0,
      label: (q.code || q.id) + " — " + TR.charts.clip(q.title, 48) });
    refreshCount();
    TR.wire.toast("Added to deck (" + deck.items.length + ")");
  };

  /** Add a composite model snapshot to the deck. */
  deck.addComposite = function (model, payload) {
    deck.items.push({ kind: "composite", model: model,
      label: "Composite — " + model.items.map(function (i) {
        return i.code; }).join(" + ") });
    refreshCount();
    TR.wire.toast("Composite added to deck (" + deck.items.length + ")");
  };

  deck.removeAt = function (index, payload) {
    deck.items.splice(index, 1);
    refreshCount();
    deck.openDrawer(payload);
  };

  deck.clear = function (payload) {
    deck.items = [];
    refreshCount();
    deck.openDrawer(payload);
  };

  deck.openDrawer = function (payload) {
    var drawer = document.getElementById("deck-drawer");
    var list = deck.items.length
      ? deck.items.map(function (item, i) {
          return '<div class="deckitem"><span>' + (i + 1) + ". " +
            fmt.escapeHtml(item.label) + "</span>" +
            '<button type="button" data-action="deck-remove" data-index="' + i +
            '" aria-label="Remove from deck">✕</button></div>';
        }).join("")
      : '<p class="drawerhint">The deck is empty. Use <strong>+ Deck</strong> on any ' +
        "question or composite view, then download a native PowerPoint file — " +
        "real text and tables, every bar an editable shape. No screenshots.</p>";
    drawer.innerHTML = '<div class="drawerhead"><h2>Export deck</h2>' +
      '<button type="button" data-action="drawer-close" aria-label="Close">✕</button></div>' +
      list +
      (deck.items.length
        ? '<button type="button" class="primary wide" data-action="deck-download">' +
          "Download .pptx (" + deck.items.length + " exhibits)</button>" +
          '<button type="button" class="wide" data-action="deck-clear">Clear deck</button>'
        : "");
    TR.wire.openDrawer("deck-drawer");
  };

  /** Build the slide XML list for the current deck (pure given payload). */
  deck.buildSlides = function (payload) {
    var slideXmls = [TR.pptxSlides.titleSlide(payload, deck.items.length)];
    deck.items.forEach(function (item) {
      if (item.kind === "question") {
        var q = TR.data.questionById(payload, item.qid);
        if (q) {
          slideXmls.push.apply(slideXmls,
            TR.pptxSlides.questionSlides(q, payload, item.colIndex));
        }
      } else {
        slideXmls.push(TR.pptxSlides.compositeSlide(item.model, payload));
      }
    });
    return slideXmls;
  };

  /** Package and download the deck as a .pptx. */
  deck.download = function (payload) {
    var bytes;
    try {
      bytes = TR.pptx.package(deck.buildSlides(payload), payload);
    } catch (e) {
      if (global.console) console.error("[TurasReport] pptx build failed:", e);
      TR.wire.toast("PPTX build failed — see console");
      return;
    }
    var blob = new Blob([bytes], {
      type: "application/vnd.openxmlformats-officedocument.presentationml.presentation"
    });
    var link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = fmt.slug(payload.project.name) + "_deck.pptx";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
    TR.wire.closeDrawers();
    TR.wire.toast("Native PowerPoint downloaded — fully editable");
  };

})(typeof window !== "undefined" ? window : globalThis);

/**
 * In-browser self-test — open the report with #selftest appended to the URL
 * and a pass/fail panel renders at the top. Mirrors the node known-answer
 * suite so the report can be verified without any tooling installed.
 */
(function (global) {
  "use strict";
  var TR = global.TR;

  var selftest = TR.selftest = {};

  function assertEqual(actual, expected, label) {
    var a = JSON.stringify(actual), e = JSON.stringify(expected);
    if (a !== e) throw new Error(label + ": expected " + e + ", got " + a);
  }

  /** Shared known-answer cases (also run by tests/run_tests.mjs via node). */
  selftest.cases = function () {
    return [
      { name: "fmt.num percent rounding", fn: function () {
        assertEqual(TR.fmt.num(42.4, "pct"), "42%", "42.4 pct");
        assertEqual(TR.fmt.num(42.5, "pct"), "43%", "42.5 pct");
        assertEqual(TR.fmt.num(3.84, "dec1"), "3.8", "3.84 dec1");
        assertEqual(TR.fmt.num(5, "nps"), "+5", "nps positive");
        assertEqual(TR.fmt.num(-9, "nps"), "-9", "nps negative");
        assertEqual(TR.fmt.num(null, "pct"), "–", "null");
      } },
      { name: "fmt.base thousands", fn: function () {
        assertEqual(TR.fmt.base(12345), "12\u202F345", "12345");
        assertEqual(TR.fmt.base(500), "500", "500");
      } },
      { name: "escaping", fn: function () {
        assertEqual(TR.fmt.escapeHtml('<b a="1">'), "&lt;b a=&quot;1&quot;&gt;", "html");
        assertEqual(TR.fmt.escapeXml("a&'b"), "a&amp;&apos;b", "xml");
      } },
      { name: "svg.niceMax steps", fn: function () {
        assertEqual(TR.svg.niceMax(47), 50, "47");
        assertEqual(TR.svg.niceMax(82), 100, "82");
        assertEqual(TR.svg.niceMax(130), 150, "130");
        assertEqual(TR.svg.niceMax(0), 10, "0");
      } },
      { name: "svg.shade colour mix", fn: function () {
        assertEqual(TR.svg.shade("#000000", 0.5), "#808080", "black 0.5");
        assertEqual(TR.svg.shade("#323367", 1), "#323367", "full strength");
      } },
      { name: "crc32 known answers", fn: function () {
        assertEqual(TR.zip.crc32(TR.zip.bytes("123456789")), 0xCBF43926, "123456789");
        assertEqual(TR.zip.crc32(TR.zip.bytes("")), 0, "empty");
      } },
      { name: "zip structure", fn: function () {
        var bytes = TR.zip.build([{ name: "a.txt", data: "hello" },
          { name: "b/c.xml", data: "<x/>" }]);
        assertEqual([bytes[0], bytes[1], bytes[2], bytes[3]],
          [0x50, 0x4B, 0x03, 0x04], "local header signature");
        var eocd = bytes.length - 22;
        assertEqual([bytes[eocd], bytes[eocd + 1], bytes[eocd + 2], bytes[eocd + 3]],
          [0x50, 0x4B, 0x05, 0x06], "EOCD signature");
        assertEqual(bytes[eocd + 10] + (bytes[eocd + 11] << 8), 2, "entry count");
      } },
      { name: "validate accumulates errors", fn: function () {
        var bad = { project: {}, banner: { columns: ["Total", "A"] },
          questions: [{ id: "x", title: "t", type: "wrong",
            rows: [{ label: "r", values: [1] }] }] };
        var res = TR.data.validate(bad);
        assertEqual(res.ok, false, "ok flag");
        var codes = res.errors.map(function (e) { return e.code; });
        assertEqual(codes.indexOf("DATA_NO_PROJECT") >= 0, true, "project error");
        assertEqual(codes.indexOf("DATA_Q_BAD_TYPE") >= 0, true, "type error");
        assertEqual(codes.indexOf("DATA_ROW_LEN") >= 0, true, "row length error");
      } },
      { name: "bar geometry known answer", fn: function () {
        var payload = { project: { name: "t", brand_colour: "#323367" },
          banner: { columns: ["Total"] },
          questions: [] };
        var q = { id: "k", title: "k", type: "single",
          rows: [{ label: "Row", values: [25] }] };
        var svgString = TR.charts.hBars(q, payload, 0);
        // plot width = 660-170-64 = 426; axis max 25 -> 25; bar = full 426
        assertEqual(svgString.indexOf('width="426"') >= 0, true, "bar width 426");
      } },
      { name: "composer.compose model", fn: function () {
        var payload = { project: { name: "t" },
          banner: { columns: ["Total", "A"] },
          questions: [
            { id: "a", code: "A1", title: "A", type: "single", bases: [10, 5],
              rows: [{ label: "x", values: [40, 20] }] },
            { id: "b", code: "B1", title: "B", type: "single", bases: [10, 5],
              rows: [{ label: "y", values: [60, 30] }] }
          ] };
        var res = TR.composer.compose(payload, ["a", "b"], 0);
        assertEqual(res.ok, true, "ok");
        assertEqual(res.model.items.length, 2, "items");
        assertEqual(res.model.sharedMax, 60, "shared max");
        assertEqual(res.model.trends.length, 0, "no trends");
        var tooFew = TR.composer.compose(payload, ["a"], 0);
        assertEqual(tooFew.ok, false, "min enforced");
      } },
      { name: "pptx package parts", fn: function () {
        var payload = { project: { name: "t", brand_colour: "#323367" },
          banner: { columns: ["Total"] }, questions: [] };
        var bytes = TR.pptx.package([TR.pptxSlides.titleSlide(payload, 1)], payload);
        assertEqual(bytes.length > 2000, true, "non-trivial size");
        assertEqual([bytes[0], bytes[1]], [0x50, 0x4B], "zip magic");
      } },
      { name: "renderer survives broken question (browser)", fn: function () {
        if (typeof document === "undefined") return;
        var payload = TR.state.payload;
        var broken = { id: "__broken__", code: "X", title: "Broken", type: "single",
          rows: null, stats: [{ label: "Mean", values: payload.banner.columns.map(
            function () { return 1; }) }] };
        var article = document.createElement("article");
        article.setAttribute("data-q", "__broken__");
        article.setAttribute("data-col", "0");
        article.innerHTML = '<div class="cardbody pending"></div>';
        var patched = { project: payload.project, banner: payload.banner,
          questions: [broken] };
        TR.cards.fill(article, patched);
        var table = article.querySelector('[data-slot="table"]');
        assertEqual(!!table && table.innerHTML.indexOf("Mean") >= 0, true,
          "table renders despite missing rows");
      } }
    ];
  };

  /** Run all cases; render a panel in the browser, return results. */
  selftest.run = function () {
    var results = selftest.cases().map(function (testCase) {
      try {
        testCase.fn();
        return { name: testCase.name, ok: true, error: null };
      } catch (e) {
        return { name: testCase.name, ok: false, error: e.message };
      }
    });
    if (typeof document !== "undefined") {
      var failed = results.filter(function (r) { return !r.ok; }).length;
      var panel = document.createElement("section");
      panel.className = "card selftest" + (failed ? " selftest-fail" : "");
      panel.innerHTML = "<h2>Self-test: " + (results.length - failed) + "/" +
        results.length + " passed</h2><ul>" + results.map(function (r) {
          return "<li>" + (r.ok ? "✓" : "✗") + " " + TR.fmt.escapeHtml(r.name) +
            (r.error ? " — <code>" + TR.fmt.escapeHtml(r.error) + "</code>" : "") +
            "</li>";
        }).join("") + "</ul>";
      var main = document.getElementById("main");
      if (main) main.prepend(panel);
    }
    return results;
  };

})(typeof window !== "undefined" ? window : globalThis);
</script>
</body>
